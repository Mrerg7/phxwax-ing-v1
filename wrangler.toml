name = "phxwax-ing-v1"
main = "src/worker.ts"
compatibility_date = "2026-06-30"
workers_dev = true
preview_urls = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
html_handling = "force-trailing-slash"
run_worker_first = true

# Bind to custom domains
[[routes]]
pattern = "phxwax.ing"
custom_domain = true

[[routes]]
pattern = "www.phxwax.ing"
custom_domain = true
