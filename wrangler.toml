name = "phxwax-ing-v1"
main = "src/worker.ts"
compatibility_date = "2026-06-30"
workers_dev = true
preview_urls = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
html_handling = "force-trailing-slash"

# Bind to custom domain phxwax.ing
[[routes]]
pattern = "phxwax.ing"
custom_domain = true
